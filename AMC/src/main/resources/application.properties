spring.application.name=AMC

## PostgreSQL datasource (override via environment variables in production)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:amc}
spring.datasource.username=${POSTGRES_USER:amc}
spring.datasource.password=${POSTGRES_PASSWORD:amc}
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA / Hibernate schema strategy
## create-drop: recreate schema each startup (dev only). Use update/validate in prod.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

## SQL initialization (only data.sql now)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

## Devtools (optional) - keep restart disabled to avoid unintended reload loops
spring.devtools.restart.enabled=false

## Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method

server.port=8081

## Logging (set to INFO by default; raise if troubleshooting)
logging.level.com.example.amc=INFO
logging.level.org.springframework=INFO

## JWT
# 256-bit base64 secret (example only; replace in production)
app.jwt.secret=${JWT_SECRET:U2VjdXJlU3ByaW5nQm9vdE1hbmFnZXJUb2tlblNlY3JldFNlY3JldFNlY3JldDEyMzQ1Ng==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

## Media uploads
app.media.upload-dir=uploads/media
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
