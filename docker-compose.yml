services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: amc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - amc-network

  # Spring Boot Backend
  backend:
    build:
      context: ./AMC
      dockerfile: Dockerfile
    container_name: amc-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - amc-network

  # Next.js Frontend
  frontend:
    build:
      context: ./AMC-Front
      dockerfile: Dockerfile
    container_name: amc-frontend
    restart: unless-stopped
    environment:
      # Server-side API URL (inside Docker network)
      NEXT_SERVER_API_URL: http://backend:8081
      # Not needed anymore since we use proxy
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_USE_PROXY: "true"
    depends_on:
      - backend
    networks:
      - amc-network

volumes:
  postgres_data:
  uploads_data:

networks:
  amc-network:
    driver: bridge

